version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: taxibot-postgres
    restart: always
    environment:
      POSTGRES_USER: taxibot
      POSTGRES_PASSWORD: taxibot_password_2026
      POSTGRES_DB: taxibot_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxibot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taxibot-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  crm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taxibot-crm
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://taxibot:taxibot_password_2026@postgres:5432/taxibot_crm
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change_this_secret_in_production
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
